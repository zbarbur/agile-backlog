# Backlog Item Schema
# Each YAML file in backlog/ must conform to this structure.

required_fields:
  - title
  - status
  - priority
  - category

fields:
  id:
    type: string
    description: Derived from filename (e.g., fix-auth-leak from fix-auth-leak.yaml)

  title:
    type: string
    description: Short descriptive title

  status:
    type: string
    enum: [backlog, doing, done]
    default: backlog

  priority:
    type: string
    enum: [P1, P2, P3]
    description: P1=critical, P2=important, P3=nice-to-have

  category:
    type: string
    examples: [security, scanner, api, infra, tech-debt, docs, feature]

  sprint_target:
    type: integer
    nullable: true
    description: Which sprint this is planned for (null = unplanned)

  created:
    type: date
    description: When the item was created

  updated:
    type: date
    description: Last modification date

  depends_on:
    type: list
    items: string
    description: List of item IDs this depends on

  tags:
    type: list
    items: string
    description: Free-form tags for filtering

  goal:
    type: string
    description: One-sentence goal — what this task delivers and why

  complexity:
    type: string
    enum: [S, M, L]
    nullable: true
    description: Task complexity — S(mall), M(edium), L(arge)

  technical_specs:
    type: list
    items: string
    description: Concrete implementation details — file paths, endpoints, schemas

  description:
    type: string
    multiline: true
    description: Detailed description of the work

  acceptance_criteria:
    type: list
    items: string
    description: Verifiable completion criteria

  test_plan:
    type: list
    items: string
    description: Which tests to write and what they verify

  notes:
    type: string
    multiline: true
    description: Additional context, references, discussion

  phase:
    type: string
    enum: [plan, build, review]
    nullable: true
    description: Workflow phase for items in 'doing' status

  design_reviewed:
    type: boolean
    default: false
    description: Whether design review has been completed

  code_reviewed:
    type: boolean
    default: false
    description: Whether code review has been completed

  agent_notes:
    type: list
    items:
      type: object
      properties:
        text: { type: string }
        flagged: { type: boolean, default: false }
        resolved: { type: boolean, default: false }
        created: { type: date }
    description: Notes for human-to-agent communication. Flagged notes are for agent attention.
