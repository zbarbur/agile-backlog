description: "Clicking Edit in the side panel closes the panel and opens a separate\
  \ dialog. Instead, the panel should switch to edit mode inline \u2014 fields become\
  \ editable inputs within the same panel. This avoids context loss and aligns with\
  \ the Phase 2 click-to-edit spec, but even Phase 1 should keep the panel open with\
  \ the edit dialog overlaid or embedded."
