description: 'When agile-backlog is adopted into a project, Claude Code agents don''t
  know the CLI syntax. They guess flags (e.g. edit --status instead of move --status)
  and waste round-trips. Need a skill (.claude/skills/cli-reference/SKILL.md) documenting
  all commands: add, edit, move, list, show, serve, flagged, note, validate, sprint-status,
  set-sprint. Should be auto-copied during adoption (Step 6 of ADOPTION.md). Discovered
  during BigQuery-connector adoption.'
acceptance_criteria:
- Skill file at .claude/skills/cli-reference/SKILL.md documents all CLI commands
- Each command lists syntax, required/optional flags, and examples
- Adoption guide Step 6 includes cli-reference in the skills list
- Lint clean (.venv/bin/ruff check . && .venv/bin/ruff format --check .)
