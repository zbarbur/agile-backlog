description: 'Dedicated sprint planning feature combining:

  1. Backlog view sections: Backlog (unplanned), Next Sprint (N+1), Future (N+2+)

  2. Drag-and-drop or buttons to move items between sections

  3. Auto-set sprint_target when moving to Next/Future

  4. Ties together with drag-and-drop backlog item

  5. Requires brainstorming session for UX design'
