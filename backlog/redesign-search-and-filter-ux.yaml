description: 'Redesign the entire filter/search bar based on research findings:

  1. Multi-select dropdowns with use-chips (Linear-style)

  2. Same field multiple values = OR, different fields = AND

  3. Active filters shown as dismissible chips below filter bar

  4. Clear all button

  5. Dark theme styling for all dropdowns and menus

  6. Search combines with filters (AND logic)

  7. Consider filter presets (e.g., ''My sprint items'', ''Unplanned P1s'')'
