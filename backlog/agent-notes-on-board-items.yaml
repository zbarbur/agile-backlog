description: 'Add a notes/comments system on board items for human-to-agent communication:

  1. Add a note with a text area in the card detail view

  2. Flag a note for agent attention (e.g., a checkbox or tag)

  3. Agent reads flagged notes via CLI (agile-backlog list --flagged or similar)

  4. Agent acts on the note and marks it resolved

  5. Notes history preserved in the YAML item

  This enables async communication between human and AI agent via the board.'
