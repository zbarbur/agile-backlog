description: 'Current sprint detection should not rely on inferring from items. Instead:

  1. Store current sprint number in a config file (.agile-backlog.yaml or similar)

  2. Sprint-start sets the current sprint number

  3. Sprint-end clears it

  4. UI reads from config, not from item inference

  5. This ensures sprint badge and Add Item dialog always know the current sprint'
