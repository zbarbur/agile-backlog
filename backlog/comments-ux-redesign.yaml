goal: Redesign comments as threaded conversations with status-colored badges and resolve
  from UI
complexity: L
technical_specs:
- 'Comment schema: {text, author (user/agent), flagged, resolved, created, reply_to
  (optional)}'
- Add model_validator to migrate old agent_notes format
- 'Badge color logic: red if any unresolved+flagged, green if all resolved, blue if
  comments exist'
- Resolve button per comment in dialog
description: "Multiple comment UX issues need proper design:\n1. Agent response to\
  \ a comment not visible \u2014 only the original comment shows, not the agent's\
  \ reply/resolution\n2. Badge color should reflect status: red = unresolved flagged\
  \ comment, green = all resolved, blue = comments exist but none flagged\n3. Need\
  \ a way for agent to reply TO a specific comment (threaded or inline response)\n\
  4. Need a way to mark individual comments as resolved from the UI (not just CLI)\n\
  5. Comment dialog should show the full conversation thread, not just the original\
  \ comment\n6. Consider a proper comment thread design (like GitHub issue comments)\n\
  This needs a brainstorming/design session before implementation."
acceptance_criteria:
- Comment dialog shows full thread (original + replies)
- Agent can reply to specific comments
- Resolve button on each comment in UI
- 'Badge color: red=unresolved flagged, green=all resolved, blue=has comments'
- Tests pass
test_plan:
- 'Manual: add comment, flag, resolve from UI, verify badge colors'
- 'tests/test_cli.py: test resolve command'
