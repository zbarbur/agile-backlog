description: "Analyze complete Claude Code session files (~/.claude/projects/) to\
  \ understand full token economics: prompt sizes, response sizes, tool call costs,\
  \ context window utilization over time, compaction events, wasted context. Research\
  \ existing projects doing session analysis (claude-token-counter, ccusage, etc.).\
  \ Includes: smart prompt gate (UserPromptSubmit hook to detect trivial CLI commands\
  \ and suggest running directly), session replay/visualization, cost-per-task estimation.\
  \ Needs brainstorming and research before design \u2014 there may be open source\
  \ tools already solving parts of this."
acceptance_criteria:
- Edit, Write, Skill tools logged via PostToolUse hooks
- post-tool-logger.sh extracts file_path for Edit/Write, skill name for Skill
- context_report.py produces tool-type breakdown (reads, writes, searches, commands)
- Report includes read:write ratio and re-read waste metric
- CLI context-report command outputs enriched report
- Tests pass (.venv/bin/pytest tests/ -v)
- Lint clean (.venv/bin/ruff check . && .venv/bin/ruff format --check .)
test_plan:
- 'tests/test_context_report.py: test Edit/Write/Skill log parsing'
- 'tests/test_context_report.py: test read:write ratio calculation'
- 'tests/test_context_report.py: test re-read waste metric'
