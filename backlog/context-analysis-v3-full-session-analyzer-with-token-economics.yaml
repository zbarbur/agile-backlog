description: "Analyze complete Claude Code session files (~/.claude/projects/) to\
  \ understand full token economics: prompt sizes, response sizes, tool call costs,\
  \ context window utilization over time, compaction events, wasted context. Research\
  \ existing projects doing session analysis (claude-token-counter, ccusage, etc.).\
  \ Includes: smart prompt gate (UserPromptSubmit hook to detect trivial CLI commands\
  \ and suggest running directly), session replay/visualization, cost-per-task estimation.\
  \ Needs brainstorming and research before design \u2014 there may be open source\
  \ tools already solving parts of this."
