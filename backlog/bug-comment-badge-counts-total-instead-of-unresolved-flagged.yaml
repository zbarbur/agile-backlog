description: 'Badge shows total comment count (blue 3) instead of unresolved flagged
  count (red 1). Logic should be:

  - Red badge with count of unresolved+flagged comments

  - Blue badge with total count if no unresolved flagged

  - No badge if no comments

  Also: agent reply should auto-resolve the original flagged comment, or agent should
  explicitly resolve via CLI.'
acceptance_criteria:
- Red badge shows count of unresolved+flagged comments only
- Blue badge shows total comment count when no unresolved flagged exist
- No badge shown when item has zero comments
- Tests pass (pytest tests/ -v)
